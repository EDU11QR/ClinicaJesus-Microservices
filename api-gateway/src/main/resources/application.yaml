server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true

      routes:

        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/auth/**

        - id: doctor-service
          uri: lb://doctor-service
          predicates:
            - Path=/api/doctores/**

        - id: schedule-service
          uri: lb://schedule-service
          predicates:
            - Path=/api/horarios/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/